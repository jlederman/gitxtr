# Build, package (Velopack) and publish a cross-platform release on every `v*` tag.
# Each OS job self-contained-publishes the app, packs an installer + delta update feed, and
# uploads to the GitHub Release for the tag. macOS/Windows builds are signed only when the
# corresponding cert secrets are configured — otherwise they ship unsigned (still installable).
#
# Required secrets for signing (optional; unsigned without them):
#   macOS:   APPLE_CERT_P12 (base64 .p12), APPLE_CERT_PASSWORD,
#            APPLE_SIGN_IDENTITY ("Developer ID Application: … (TEAMID)"),
#            APPLE_INSTALL_IDENTITY ("Developer ID Installer: … (TEAMID)"),
#            APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD (app-specific password for notarytool)
#   Windows: WINDOWS_CERT_P12 (base64 .pfx), WINDOWS_CERT_PASSWORD
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
            # win-x64 and win-arm64 both default to Velopack's "win" channel, producing identical
            # asset names (releases.win.json, gitxtr-win-Setup.exe…) that collide in one GitHub
            # release. Give arm64 its own channel; x64 stays on the default "win" so existing
            # installs keep updating. The app picks the matching channel at runtime (Updater.cs).
            channel: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_INSTALL_IDENTITY: ${{ secrets.APPLE_INSTALL_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      WINDOWS_CERT_P12: ${{ secrets.WINDOWS_CERT_P12 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish (self-contained)
        run: >
          dotnet publish src/Gitxtr.Host/Gitxtr.Host.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true -o publish

      - name: Install vpk
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Set up macOS signing
        if: runner.os == 'macOS' && env.APPLE_CERT_P12 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          # Prepend our keychain to the search list so codesign/productsign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k actions "$KEYCHAIN"
          xcrun notarytool store-credentials gitxtr-notary \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD"

      - name: Decode Windows cert
        if: runner.os == 'Windows' && env.WINDOWS_CERT_P12 != ''
        run: echo "$WINDOWS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.pfx"

      - name: Pack
        timeout-minutes: 10
        run: |
          ARGS=(-u gitxtr -v "${{ steps.ver.outputs.version }}" -p publish --packTitle gitxtr)
          if [ -n "${{ matrix.channel }}" ]; then
            ARGS+=(--channel "${{ matrix.channel }}")
          fi
          case "$RUNNER_OS" in
            macOS)   ARGS+=(--icon build/icon/icon.icns) ;;
            Windows) ARGS+=(--icon build/icon/icon.ico) ;;
            Linux)   ARGS+=(--icon build/icon/icon.png) ;;
          esac
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$APPLE_CERT_P12" ]; then
            ARGS+=(--signAppIdentity "$APPLE_SIGN_IDENTITY" \
                   --signEntitlements build/gitxtr.entitlements \
                   --notaryProfile gitxtr-notary)
          fi
          if [ "$RUNNER_OS" = "Windows" ] && [ -n "$WINDOWS_CERT_P12" ]; then
            ARGS+=(--signParams "/fd sha256 /tr http://timestamp.digicert.com /td sha256 /f $RUNNER_TEMP/cert.pfx /p $WINDOWS_CERT_PASSWORD")
          fi
          vpk pack "${ARGS[@]}"

      - name: Sign and notarize macOS installer
        if: runner.os == 'macOS' && env.APPLE_CERT_P12 != ''
        timeout-minutes: 5
        run: |
          PKG="Releases/gitxtr-osx-Setup.pkg"
          SIGNED="Releases/gitxtr-osx-Setup-signed.pkg"
          productsign --sign "$APPLE_INSTALL_IDENTITY" "$PKG" "$SIGNED"
          xcrun notarytool submit "$SIGNED" --keychain-profile gitxtr-notary --wait
          xcrun stapler staple "$SIGNED"
          mv "$SIGNED" "$PKG"

      - name: Upload to GitHub Release
        run: |
          ARGS=(github --repoUrl "https://github.com/${{ github.repository }}"
                --merge --releaseName "gitxtr ${{ steps.ver.outputs.version }}"
                --tag "v${{ steps.ver.outputs.version }}" --token "${{ secrets.GITHUB_TOKEN }}")
          if [ -n "${{ matrix.channel }}" ]; then
            ARGS+=(--channel "${{ matrix.channel }}")
          fi
          vpk upload "${ARGS[@]}"

  finalize:
    needs: release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    defaults:
      run:
        shell: bash
    steps:
      - name: Publish release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release edit "v$VERSION" --draft=false --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
